<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" fill="none">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#060b1f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrowFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="arrowBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="road2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="arrowGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cityGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background purple radial glow -->
  <ellipse cx="360" cy="220" rx="280" ry="210" fill="url(#bgGlow)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.25" fill="#6366f1">
    <circle cx="60" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="180" cy="40" r="1.5"/>
    <circle cx="240" cy="40" r="1.5"/><circle cx="300" cy="40" r="1.5"/><circle cx="360" cy="40" r="1.5"/>
    <circle cx="420" cy="40" r="1.5"/><circle cx="480" cy="40" r="1.5"/><circle cx="540" cy="40" r="1.5"/>
    <circle cx="600" cy="40" r="1.5"/><circle cx="660" cy="40" r="1.5"/>
    <circle cx="60" cy="90" r="1.5"/><circle cx="120" cy="90" r="1.5"/><circle cx="180" cy="90" r="1.5"/>
    <circle cx="240" cy="90" r="1.5"/><circle cx="300" cy="90" r="1.5"/><circle cx="360" cy="90" r="1.5"/>
    <circle cx="420" cy="90" r="1.5"/><circle cx="480" cy="90" r="1.5"/><circle cx="540" cy="90" r="1.5"/>
    <circle cx="600" cy="90" r="1.5"/><circle cx="660" cy="90" r="1.5"/>
    <circle cx="60" cy="140" r="1.5"/><circle cx="120" cy="140" r="1.5"/><circle cx="180" cy="140" r="1.5"/>
    <circle cx="240" cy="140" r="1.5"/><circle cx="300" cy="140" r="1.5"/>
    <circle cx="420" cy="140" r="1.5"/><circle cx="480" cy="140" r="1.5"/><circle cx="540" cy="140" r="1.5"/>
    <circle cx="600" cy="140" r="1.5"/><circle cx="660" cy="140" r="1.5"/>
    <circle cx="60" cy="190" r="1.5"/><circle cx="120" cy="190" r="1.5"/>
    <circle cx="540" cy="190" r="1.5"/><circle cx="600" cy="190" r="1.5"/><circle cx="660" cy="190" r="1.5"/>
  </g>

  <!-- Perspective road / light trail lines converging from bottom -->
  <path d="M360 430 L 80 520 L 0 520" stroke="url(#roadGrad)" stroke-width="2.5" opacity="0.7"/>
  <path d="M360 430 L 640 520 L 720 520" stroke="url(#roadGrad)" stroke-width="2.5" opacity="0.7"/>
  <path d="M360 430 L 180 520" stroke="url(#road2)" stroke-width="1.5" opacity="0.5"/>
  <path d="M360 430 L 540 520" stroke="url(#road2)" stroke-width="1.5" opacity="0.5"/>
  <path d="M360 430 L 290 520" stroke="url(#road2)" stroke-width="1" opacity="0.3"/>
  <path d="M360 430 L 430 520" stroke="url(#road2)" stroke-width="1" opacity="0.3"/>

  <!-- Road surface glow -->
  <path d="M200 520 L360 390 L520 520 Z" fill="#7c3aed" opacity="0.07"/>

  <!-- City silhouette buildings -->
  <g fill="#0d1640">
    <rect x="0" y="390" width="35" height="130"/>
    <rect x="8" y="375" width="18" height="15"/>
    <rect x="40" y="370" width="25" height="150"/>
    <rect x="70" y="350" width="30" height="170"/>
    <rect x="75" y="335" width="10" height="15"/>
    <rect x="105" y="380" width="20" height="140"/>
    <rect x="130" y="400" width="15" height="120"/>

    <rect x="560" y="395" width="15" height="125"/>
    <rect x="580" y="370" width="25" height="150"/>
    <rect x="610" y="360" width="30" height="160"/>
    <rect x="615" y="345" width="10" height="15"/>
    <rect x="645" y="385" width="20" height="135"/>
    <rect x="670" y="375" width="30" height="145"/>
    <rect x="700" y="410" width="20" height="110"/>

    <!-- Center buildings behind arrow -->
    <rect x="280" y="415" width="18" height="105"/>
    <rect x="305" y="420" width="12" height="100"/>
    <rect x="400" y="420" width="12" height="100"/>
    <rect x="418" y="415" width="18" height="105"/>
  </g>

  <!-- Window lights in buildings -->
  <g fill="#3b82f6" opacity="0.4">
    <rect x="11" y="395" width="4" height="3"/><rect x="18" y="395" width="4" height="3"/>
    <rect x="11" y="403" width="4" height="3"/><rect x="18" y="403" width="4" height="3"/>
    <rect x="74" y="360" width="4" height="3"/><rect x="82" y="360" width="4" height="3"/>
    <rect x="74" y="368" width="4" height="3"/>
    <rect x="615" y="365" width="4" height="3"/><rect x="623" y="365" width="4" height="3"/>
    <rect x="615" y="373" width="4" height="3"/>
  </g>

  <!-- Main 3D Arrow - back face (darker) -->
  <g filter="url(#arrowGlow)">
    <path d="M 185 100 L 390 260 L 185 420 L 225 420 L 440 260 L 225 100 Z" fill="url(#arrowBack)" opacity="0.9"/>
    <!-- Main 3D Arrow - front face (bright gradient) -->
    <path d="M 240 100 L 445 260 L 240 420 L 280 420 L 495 260 L 280 100 Z" fill="url(#arrowFront)"/>
  </g>

  <!-- Arrow highlight edge -->
  <path d="M 280 100 L 495 260 L 280 420" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6" fill="none" filter="url(#softGlow)"/>

  <!-- Floating particles -->
  <g filter="url(#softGlow)">
    <circle cx="150" cy="160" r="3" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="120" cy="280" r="2" fill="#6366f1" opacity="0.6"/>
    <circle cx="570" cy="150" r="3" fill="#3b82f6" opacity="0.8"/>
    <circle cx="600" cy="290" r="2" fill="#06b6d4" opacity="0.6"/>
    <circle cx="160" cy="340" r="2" fill="#a78bfa" opacity="0.5"/>
    <circle cx="555" cy="360" r="2" fill="#38bdf8" opacity="0.5"/>
    <circle cx="200" cy="200" r="1.5" fill="#c4b5fd" opacity="0.7"/>
    <circle cx="520" cy="200" r="1.5" fill="#7dd3fc" opacity="0.7"/>
  </g>
</svg>
